<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lawnmower Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      /* 100vh assumes the browser chrome (e.g. Safari's address/search
         bar) is collapsed, so the page renders taller than what's actually
         visible when it's showing — pushing bottom content underneath it.
         100dvh tracks the real, currently-visible viewport; vh stays as a
         fallback for browsers that don't support dvh. */
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }
    canvas { display: block; image-rendering: pixelated; }

    /* #game-container holds the Phaser canvas; Phaser's FIT scale mode
       fits + centers the canvas within whatever box this element resolves
       to, so shrinking it (below) is how we carve out room for controls. */
    #game-container {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }
    /* Reserves space below the canvas for the D-pad. Empty by default
       (desktop and mobile landscape already use the full window well, so
       #game-container's flex:1 claims everything and this stays at 0).
       Only mobile portrait needs it: the yard grid is sized (in game.js) so
       its aspect ratio nearly fills the screen, with #game-container
       pinned to exactly that rendered height via an aspect-ratio set by
       game.js's applyResponsiveLayout() — this spacer becomes a real,
       ~1-inch control zone with everything left over. */
    #controls-spacer {
      flex: 0 0 0px;
      position: relative;
    }
    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      #game-container  { flex: 0 0 auto; width: 100%; }
      #controls-spacer {
        flex: 1 1 auto;
        display: flex;
        align-items: center;    /* vertically center the D-pad in the leftover space */
        justify-content: center; /* and horizontally, across the full-width control zone */
        /* Extra safety margin below the D-pad for the iPhone home-indicator
           bar / Safari's collapsed-toolbar strip, on top of CONTROL_RESERVE_PX
           already reserving room in game.js. */
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }
    }

    /* ── UI overlay: scaled to match the canvas ─────────────────────────── */
    #ui-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    /* This div lives in game-pixel coordinates; JS applies a transform
       so it sits exactly on top of the Phaser canvas at whatever scale.
       Width/height below are just a fallback — game.js's
       applyResponsiveLayout() sets the real W/H inline, since the yard
       grid (and so the canvas size) varies per device in portrait. */
    #ui-canvas {
      position: absolute;
      width: 384px;
      height: 288px;
      transform-origin: top left;
    }
    #ui-canvas .ui-text {
      position: absolute;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1;
      white-space: nowrap;
    }
    /* No background bar behind it anymore, so it needs its own contrast
       against whatever's under it (grass, obstacles, mowed cells). */
    #hud-level {
      left: 8px; top: 6px;
      font-size: 10px; color: #ffcc44; font-weight: 700;
      text-shadow: 0 0 3px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,0.9), 1px 1px 0 rgba(0,0,0,0.9);
    }

    /* ── Win overlay ─────────────────────────────────────────────────────── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    #win-overlay.visible {
      display: flex;
      pointer-events: auto;
    }
    #win-box {
      background: rgba(0, 18, 0, 0.93);
      border: 2px solid #3a6a3a;
      border-radius: 10px;
      padding: 28px 40px;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      box-shadow: 0 4px 24px rgba(0,0,0,0.7);
    }
    #win-box h2 {
      color: #88ff88;
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: 1px;
    }
    #win-next   { color: #dddddd; font-size: 15px; margin: 0 0 8px; }
    #win-action { color: #777777; font-size: 12px; margin: 0; }

    /* ── Intro overlay: shown once at the very start of the game, before
       the first level. Visible by default in markup (not toggled by JS
       until Start is tapped) so it's already up the instant the loading
       screen (z-index 30, above this) hides. ─────────────────────────── */
    #intro-overlay {
      display: none;
      position: fixed;
      inset: 0;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    #intro-overlay.visible {
      display: flex;
      pointer-events: auto;
    }
    #intro-box {
      background: rgba(0, 18, 0, 0.93);
      border: 2px solid #3a6a3a;
      border-radius: 10px;
      padding: 28px 40px;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      box-shadow: 0 4px 24px rgba(0,0,0,0.7);
      max-width: 300px;
    }
    #intro-box h2 {
      color: #88ff88;
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: 1px;
    }
    #intro-text {
      color: #dddddd;
      font-size: 15px;
      line-height: 1.4;
      margin: 0 0 18px;
    }
    #intro-start-btn {
      background: #3a8a3a;
      color: #ffffff;
      border: 2px solid #5aca5a;
      border-radius: 8px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 10px 32px;
      cursor: pointer;
    }
    #intro-start-btn:active { background: #2a6a2a; }

    /* ── Mobile D-pad: touch-only, hidden for mouse/desktop ─────────────── */
    #dpad {
      display: none;
      /* Default (mobile landscape): fixed over the canvas's left/right dead
         zone, same as before. */
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: 216px;
      height: 216px;
      z-index: 20;
      pointer-events: none;
    }
    @media (hover: none) and (pointer: coarse) {
      #dpad { display: block; }
    }
    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      /* Portrait: a flex child of #controls-spacer (centered in the
         ~1-inch leftover space) instead of fixed to the screen edge, and
         sized down a notch to fit comfortably within it. */
      #dpad {
        position: relative;
        left: auto; top: auto; bottom: auto;
        width: 174px;
        height: 174px;
      }
      #dpad .dpad-btn { width: 58px; height: 58px; font-size: 25px; line-height: 54px; }
      #dpad #dpad-up    { left: 58px; top: 0; }
      #dpad #dpad-left  { left: 0;    top: 58px; }
      #dpad #dpad-right { left: 116px; top: 58px; }
      #dpad #dpad-down  { left: 58px; top: 116px; }
    }

    /* ── Bottom percentage readout: replaces the old top progress bar.
       Default (desktop/landscape): fixed to the opposite corner from the
       D-pad, same technique #dpad uses to float free of the zero-height
       #controls-spacer box in that mode. Portrait: pinned to the right
       edge of #controls-spacer (still position:relative in that mode)
       instead of sitting in the flex row next to the D-pad — keeps a
       clear gap between them instead of just a small margin. */
    #hud-pct-bottom {
      position: fixed;
      right: 18px;
      bottom: 18px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 4px rgba(0,0,0,0.9);
      z-index: 20;
      pointer-events: none;
    }
    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      #hud-pct-bottom {
        position: absolute;
        right: 20px;
        bottom: auto;
        top: 50%;
        transform: translateY(-50%);
        font-size: 20px;
      }
    }
    .dpad-btn {
      position: absolute;
      width: 72px;
      height: 72px;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 8px;
      color: #fff;
      font-size: 29px;
      line-height: 68px;
      text-align: center;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .dpad-btn.active { background: rgba(255, 255, 255, 0.4); }
    #dpad-up    { left: 72px;  top: 0; }
    #dpad-left  { left: 0;     top: 72px; }
    #dpad-right { left: 144px; top: 72px; }
    #dpad-down  { left: 72px;  top: 144px; }

    /* ── Loading screen: pure HTML/CSS, no JS or Phaser dependency ───────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #1a1a2e;
      transition: opacity 0.25s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #3a6a3a;
      border-top-color: #88ff88;
      border-radius: 50%;
      animation: loading-spin 0.8s linear infinite;
    }
    #loading-text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      color: #aaaaaa;
      letter-spacing: 0.5px;
    }
    @keyframes loading-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading screen: shown instantly (no JS/Phaser needed), hidden once the game is ready -->
  <div id="loading-screen">
    <div id="loading-spinner"></div>
    <div id="loading-text">Loading mower&hellip;</div>
  </div>

  <!-- Phaser injects the canvas here; sized/reserved via CSS above -->
  <div id="game-container"></div>

  <!-- Reserved control zone (real height only in mobile portrait); holds
       the D-pad so it's anchored relative to it, not the viewport edge. -->
  <div id="controls-spacer">
    <div id="dpad">
      <button id="dpad-up"    class="dpad-btn" aria-label="Up">▲</button>
      <button id="dpad-left"  class="dpad-btn" aria-label="Left">◀</button>
      <button id="dpad-right" class="dpad-btn" aria-label="Right">▶</button>
      <button id="dpad-down"  class="dpad-btn" aria-label="Down">▼</button>
    </div>
    <div id="hud-pct-bottom">0%</div>
  </div>

  <!-- UI text overlay (positioned over canvas by JS) -->
  <div id="ui-layer">
    <div id="ui-canvas">
      <span id="hud-level"  class="ui-text">L1</span>
    </div>
  </div>

  <!-- Win screen -->
  <div id="win-overlay">
    <div id="win-box">
      <h2>YARD DONE!</h2>
      <p id="win-next"></p>
      <p id="win-action"></p>
    </div>
  </div>

  <!-- Intro screen: shown once, before the first level -->
  <div id="intro-overlay" class="visible">
    <div id="intro-box">
      <h2>LET'S MOW!</h2>
      <p id="intro-text">Use the controls below to move around and mow the whole yard.</p>
      <button id="intro-start-btn">Start</button>
    </div>
  </div>

  <script src="vendor/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
