<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Lawnmower Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      /* 100vh assumes the browser chrome (e.g. Safari's address/search
         bar) is collapsed, so the page renders taller than what's actually
         visible when it's showing — pushing bottom content underneath it.
         100dvh tracks the real, currently-visible viewport; vh stays as a
         fallback for browsers that don't support dvh. */
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }
    canvas { display: block; image-rendering: pixelated; }

    /* #game-container holds the Phaser canvas; Phaser's FIT scale mode
       fits + centers the canvas within whatever box this element resolves
       to, so shrinking it (below) is how we carve out room for controls. */
    #game-container {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }
    /* Reserves space for the D-pad: below the canvas in mobile portrait,
       beside it in mobile landscape (media queries further down). Empty by
       default (desktop's mouse/trackpad input never shows the D-pad at
       all, so #game-container's flex:1 claims the full window and this
       stays at 0). Mobile portrait's yard grid is sized (in game.js) so
       its aspect ratio nearly fills the screen, with #game-container
       pinned to exactly that rendered height via an aspect-ratio set by
       game.js's applyResponsiveLayout() — this spacer becomes a real,
       ~1-inch control zone with everything left over. Mobile landscape
       instead reserves a fixed-width side strip (below) — its own aspect
       ratio doesn't grow to fill the screen the way portrait's does, so a
       simple fixed reserve is enough. */
    #controls-spacer {
      flex: 0 0 0px;
      position: relative;
    }
    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      #game-container  { flex: 0 0 auto; width: 100%; }
      #controls-spacer {
        flex: 1 1 auto;
        display: flex;
        align-items: center;    /* vertically center the D-pad in the leftover space */
        justify-content: center; /* and horizontally, across the full-width control zone */
        /* Extra safety margin below the D-pad for the iPhone home-indicator
           bar / Safari's collapsed-toolbar strip, on top of CONTROL_RESERVE_PX
           already reserving room in game.js. */
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }
    }
    /* Mobile landscape touch: same idea as portrait above, rotated 90°.
       #dpad/#hud-pct-bottom/#level-reset used to float at fixed viewport
       corners over the canvas's assumed left/right "dead zone" margin —
       but that margin only exists when the container is much wider than
       the game's 4:3 aspect ratio. On real phones in landscape (and even
       more so on ~4:3 tablets) the canvas nearly fills the viewport width,
       so the fixed-position D-pad ended up sitting on top of the mowable
       yard instead of beside it (reported directly: "controls overlaying
       the mowing area, mowing area off screen"). Reserving a real strip —
       #game-container and #controls-spacer side by side instead of
       stacked — guarantees they never overlap, the same guarantee
       portrait already had.  */
    @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
      body { flex-direction: row; }
      #game-container  { min-width: 0; }
      #controls-spacer {
        flex: 0 0 190px;
        display: flex;
        flex-direction: column;
        align-items: center;      /* center the D-pad horizontally in the strip */
        justify-content: center;  /* and vertically down its full height */
        padding: max(10px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right))
                 max(10px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      }
    }

    /* ── UI overlay: scaled to match the canvas ─────────────────────────── */
    #ui-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }
    /* This div lives in game-pixel coordinates; JS applies a transform
       so it sits exactly on top of the Phaser canvas at whatever scale.
       Width/height below are just a fallback — game.js's
       applyResponsiveLayout() sets the real W/H inline, since the yard
       grid (and so the canvas size) varies per device in portrait. */
    #ui-canvas {
      position: absolute;
      width: 384px;
      height: 288px;
      transform-origin: top left;
    }
    #ui-canvas .ui-text {
      position: absolute;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1;
      white-space: nowrap;
    }
    /* Level indicator + prev/next nav, grouped in a flex row so the arrow
       buttons sit right beside the text regardless of its width (L1 vs
       L10). #ui-layer above is pointer-events:none so clicks pass through
       to the canvas; this row opts back into pointer-events so its buttons
       are actually clickable. */
    #level-nav {
      left: 8px; top: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
      pointer-events: auto;
    }
    /* No background bar behind it anymore, so it needs its own contrast
       against whatever's under it (grass, obstacles, mowed cells). */
    #hud-level {
      font-size: 10px; color: #ffcc44; font-weight: 700;
      text-shadow: 0 0 3px rgba(0,0,0,0.9), 0 0 3px rgba(0,0,0,0.9), 1px 1px 0 rgba(0,0,0,0.9);
    }
    .level-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 16px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 3px;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .level-nav-btn:active:not(:disabled) { background: rgba(255, 255, 255, 0.4); }
    .level-nav-btn:disabled {
      opacity: 0.25;
      cursor: default;
    }
    /* Touch devices: the mouse-precision size above is too small a target
       to reliably tap, but a much bigger button read as too visually
       heavy/distracting next to the small level text. A modest bump
       instead of the full 44px touch-target guideline. */
    @media (hover: none) and (pointer: coarse) {
      .level-nav-btn {
        width: 24px;
        height: 24px;
        font-size: 15px;
        border-radius: 5px;
      }
      #level-nav { gap: 6px; }
    }

    /* ── Win overlay ─────────────────────────────────────────────────────── */
    #win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    #win-overlay.visible {
      display: flex;
      pointer-events: auto;
    }
    #win-box {
      background: rgba(0, 18, 0, 0.93);
      border: 2px solid #3a6a3a;
      border-radius: 10px;
      padding: 28px 40px;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      box-shadow: 0 4px 24px rgba(0,0,0,0.7);
    }
    #win-box h2 {
      color: #88ff88;
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: 1px;
    }
    #win-next   { color: #dddddd; font-size: 15px; margin: 0 0 8px; }
    #win-action { color: #777777; font-size: 12px; margin: 0; }

    /* ── Intro overlay: shown once at the very start of the game, before
       the first level. Visible by default in markup (not toggled by JS
       until Start is tapped) so it's already up the instant the loading
       screen (z-index 30, above this) hides. ─────────────────────────── */
    #intro-overlay {
      display: none;
      position: fixed;
      inset: 0;
      justify-content: center;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    #intro-overlay.visible {
      display: flex;
      pointer-events: auto;
    }
    #intro-box {
      background: rgba(0, 18, 0, 0.93);
      border: 2px solid #3a6a3a;
      border-radius: 10px;
      padding: 28px 40px;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      box-shadow: 0 4px 24px rgba(0,0,0,0.7);
      max-width: 300px;
    }
    #intro-box h2 {
      color: #88ff88;
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 10px;
      letter-spacing: 1px;
    }
    #intro-text {
      color: #dddddd;
      font-size: 15px;
      line-height: 1.4;
      margin: 0 0 18px;
    }
    #intro-start-btn {
      background: #3a8a3a;
      color: #ffffff;
      border: 2px solid #5aca5a;
      border-radius: 8px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 10px 32px;
      cursor: pointer;
    }
    #intro-start-btn:active { background: #2a6a2a; }

    /* ── Mobile D-pad: touch-only, hidden for mouse/desktop ─────────────── */
    #dpad {
      display: none;
      /* Base values are unused in practice — every touch device (both
         orientations, below) turns this into a normal flex child of the
         reserved #controls-spacer zone instead. Kept as a harmless
         fallback in case some touch device matches neither media query. */
      position: fixed;
      left: 18px;
      bottom: 18px;
      width: 216px;
      height: 216px;
      z-index: 20;
      pointer-events: none;
    }
    @media (hover: none) and (pointer: coarse) {
      #dpad { display: block; }
    }
    @media (hover: none) and (pointer: coarse) {
      /* Both orientations lay the D-pad out as a normal flex child of the
         reserved #controls-spacer zone (centered in it) instead of
         floating fixed over the canvas, sized down a notch to fit
         comfortably within that zone's ~190px reserve. */
      #dpad {
        position: relative;
        left: auto; top: auto; bottom: auto;
        width: 174px;
        height: 174px;
      }
      #dpad .dpad-btn { width: 58px; height: 58px; font-size: 25px; line-height: 54px; }
      #dpad #dpad-up    { left: 58px; top: 0; }
      #dpad #dpad-left  { left: 0;    top: 58px; }
      #dpad #dpad-right { left: 116px; top: 58px; }
      #dpad #dpad-down  { left: 58px; top: 116px; }
    }

    /* ── Bottom percentage readout: replaces the old top progress bar.
       Default (desktop/landscape): fixed to the opposite corner from the
       D-pad, same technique #dpad uses to float free of the zero-height
       #controls-spacer box in that mode. Portrait: pinned to the right
       edge of #controls-spacer (still position:relative in that mode)
       instead of sitting in the flex row next to the D-pad — keeps a
       clear gap between them instead of just a small margin. */
    #hud-pct-bottom {
      position: fixed;
      right: 18px;
      bottom: 18px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 4px rgba(0,0,0,0.9), 0 0 4px rgba(0,0,0,0.9);
      z-index: 20;
      pointer-events: none;
    }
    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      #hud-pct-bottom {
        position: absolute;
        right: 20px;
        bottom: auto;
        top: 50%;
        transform: translateY(-50%);
        font-size: 20px;
      }
    }
    @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
      /* Landscape's control strip runs top-to-bottom instead of side-to-
         side, so this pins to the top edge (portrait's right-edge pinning,
         rotated 90°) with the D-pad centered below it. */
      #hud-pct-bottom {
        position: absolute;
        top: 20px;
        bottom: auto;
        right: auto;
        left: 50%;
        transform: translateX(-50%);
        font-size: 20px;
      }
    }
    /* Reset-level button. Default (desktop/landscape): fixed bottom-center,
       same float-free-of-#controls-spacer technique as #dpad/#hud-pct-bottom
       (which sit at the opposite corners from each other in that mode).
       Portrait: pinned to the left edge of #controls-spacer, mirroring
       #hud-pct-bottom's own right-edge pinning — D-pad centers between the
       two. */
    #level-reset {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      z-index: 20;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #level-reset:active { background: rgba(255, 255, 255, 0.4); }
    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      #level-reset {
        position: absolute;
        left: 20px;
        bottom: auto;
        top: 50%;
        transform: translateY(-50%);
        width: 46px;
        height: 46px;
        font-size: 24px;
      }
    }
    @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
      /* Mirrors #hud-pct-bottom's top-edge pinning above, at the strip's
         bottom edge instead — D-pad centers between the two. */
      #level-reset {
        position: absolute;
        left: 50%;
        bottom: 20px;
        top: auto;
        transform: translateX(-50%);
        width: 46px;
        height: 46px;
        font-size: 24px;
      }
    }
    .dpad-btn {
      position: absolute;
      width: 72px;
      height: 72px;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 8px;
      color: #fff;
      font-size: 29px;
      line-height: 68px;
      text-align: center;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .dpad-btn.active { background: rgba(255, 255, 255, 0.4); }
    #dpad-up    { left: 72px;  top: 0; }
    #dpad-left  { left: 0;     top: 72px; }
    #dpad-right { left: 144px; top: 72px; }
    #dpad-down  { left: 72px;  top: 144px; }

    /* ── Loading screen: pure HTML/CSS, no JS or Phaser dependency ───────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #1a1a2e;
      transition: opacity 0.25s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #3a6a3a;
      border-top-color: #88ff88;
      border-radius: 50%;
      animation: loading-spin 0.8s linear infinite;
    }
    #loading-text {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
      color: #aaaaaa;
      letter-spacing: 0.5px;
    }
    @keyframes loading-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading screen: shown instantly (no JS/Phaser needed), hidden once the game is ready -->
  <div id="loading-screen">
    <div id="loading-spinner"></div>
    <div id="loading-text">Loading mower&hellip;</div>
  </div>

  <!-- Phaser injects the canvas here; sized/reserved via CSS above -->
  <div id="game-container"></div>

  <!-- Reserved control zone (real height only in mobile portrait); holds
       the D-pad so it's anchored relative to it, not the viewport edge. -->
  <div id="controls-spacer">
    <div id="dpad">
      <button id="dpad-up"    class="dpad-btn" aria-label="Up">▲</button>
      <button id="dpad-left"  class="dpad-btn" aria-label="Left">◀</button>
      <button id="dpad-right" class="dpad-btn" aria-label="Right">▶</button>
      <button id="dpad-down"  class="dpad-btn" aria-label="Down">▼</button>
    </div>
    <div id="hud-pct-bottom">0%</div>
    <button id="level-reset" aria-label="Reset level">&#8634;</button>
  </div>

  <!-- UI text overlay (positioned over canvas by JS) -->
  <div id="ui-layer">
    <div id="ui-canvas">
      <div id="level-nav" class="ui-text">
        <button id="level-prev" class="level-nav-btn" aria-label="Previous level">&#8249;</button>
        <span id="hud-level">L1</span>
        <button id="level-next" class="level-nav-btn" aria-label="Next level">&#8250;</button>
      </div>
    </div>
  </div>

  <!-- Win screen -->
  <div id="win-overlay">
    <div id="win-box">
      <h2>YARD DONE!</h2>
      <p id="win-next"></p>
      <p id="win-action"></p>
    </div>
  </div>

  <!-- Intro screen: shown once, before the first level -->
  <div id="intro-overlay" class="visible">
    <div id="intro-box">
      <h2>LET'S MOW!</h2>
      <p id="intro-text">Use the controls below to move around and mow the whole yard.</p>
      <button id="intro-start-btn">Start</button>
    </div>
  </div>

  <script src="vendor/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
